<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITESNAP | אוטומציית אתרים ב-AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-primary: #8b5cf6;
            --accent-secondary: #06b6d4;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 400px),
                radial-gradient(circle at bottom left, rgba(6, 182, 212, 0.15), transparent 400px);
        }

        /* רקע זז עדין */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--accent-secondary);
            margin-bottom: 1.5rem;
            display: block;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.25rem;
            color: var(--text-dim);
            margin-bottom: 3rem;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .cta-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .pay-button {
            background: linear-gradient(135deg, var(--accent-primary) 0%, #6d28d9 100%);
            color: white;
            border: none;
            padding: 1.25rem 3.5rem;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
            text-decoration: none;
        }

        .pay-button:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 30px rgba(139, 92, 246, 0.4);
            filter: brightness(1.1);
        }

        .pay-button:active {
            transform: translateY(0);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 100px;
            color: var(--accent-primary);
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* אנימציה עדינה לכניסה */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            animation: slideUp 0.8s ease-out;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div class="badge">✨ מהפכת ה-AI כבר כאן</div>
        <span class="logo">SITESNAP</span>
        <h1>האתר שלך. <br>במרחק לחיצה.</h1>
        <p>מנוע ה-AI החכם בעולם לבניית אתרים מותאמים אישית בתוך פחות מ-60 שניות. בלי קוד, בלי סיבוכים.</p>
        
        <div class="cta-group">
            <button class="pay-button" id="payBtn">
                התחלת בנייה עכשיו
            </button>
            <div id="statusMsg" style="margin-top: 1rem; color: var(--accent-secondary); display: none; font-weight: bold;">
                מכין את סביבת העבודה... תכף עוברים לתשלום ⚡
            </div>
        </div>

        <div class="footer">
            &copy; 2026 SITESNAP AI. כל הזכויות שמורות.
        </div>
    </div>

    <script>
        const btn = document.getElementById('payBtn');
        const msg = document.getElementById('statusMsg');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            msg.style.display = 'block';
            
            setTimeout(() => {
                alert('SITESNAP: מערכת הסליקה בחיבור! כאן יופיע דף התשלום של Stripe.');
                btn.style.display = 'block';
                msg.style.display = 'none';
            }, 1500);
        });
    </script>
</body>
</html>
