<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Your Domain | SiteSnap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .electric-blue { color: #0070f3; }
        .bg-electric-blue { background-color: #0070f3; }
        .premium-border { border: 8px solid #000; } /* עובי מקורי מהתמונה */
        .label-power-black { color: #000; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; font-size: 14px; display: block; }
        
        .status-area { display: none; animation: fadeIn 0.4s ease-out; }
        .status-area.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal Dynamic */
        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; }
        #confirm-modal.active { display: flex; }
        .modal-content { max-width: 90vw; width: fit-content; min-width: 350px; }
        #modal-domain { white-space: nowrap; display: block; transition: font-size 0.2s; }
    </style>
</head>
<body class="antialiased text-black">

    <header class="max-w-7xl mx-auto px-6 py-10 flex flex-col items-center">
        <img src="https://raw.githubusercontent.com/levydave1/trysitesnap/refs/heads/main/logo.png" alt="SiteSnap" class="h-28 w-auto object-contain mb-4">
        <div class="text-sm font-black uppercase tracking-[0.25em] text-slate-800 text-center">Premium Websites • Pure Simplicity</div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-8">
        <div class="max-w-2xl mx-auto premium-border p-12 md:p-16 rounded-[70px] relative bg-white shadow-2xl">
            <div class="absolute -top-7 left-1/2 -translate-x-1/2 bg-black text-white px-10 py-4 rounded-full font-black uppercase text-xs tracking-[0.25em] whitespace-nowrap shadow-xl">
                Concierge Domain Setup
            </div>

            <div id="search-box" class="pt-4">
                <input type="text" id="target_domain" placeholder="ENTER DOMAIN NAME" class="w-full px-6 py-6 rounded-3xl border-4 border-slate-100 bg-slate-50 focus:bg-white focus:outline-none focus:border-blue-500 transition-all font-black text-2xl text-black text-center mb-6 uppercase">
                <button onclick="checkAvailability()" id="check-btn" class="w-full bg-electric-blue text-white font-black py-7 rounded-3xl shadow-2xl hover:opacity-95 transition-all text-xl uppercase tracking-widest">
                    Check Availability →
                </button>
            </div>

            <div id="results-area" class="status-area pt-4">
                <div id="primary-status" class="mb-10 text-center">
                    <h3 id="primary-name" class="text-4xl font-black mb-4 italic tracking-tight"></h3>
                    <div id="primary-action"></div>
                </div>

                <div id="alt-container" class="border-t-4 border-black pt-10">
                    <h4 id="alt-title" class="label-power-black text-center mb-8 italic">Alternative Suggestions</h4>
                    <div id="alt-list" class="space-y-4"></div>
                </div>

                <button onclick="resetSearch()" class="w-full mt-12 py-4 bg-slate-100 rounded-2xl text-xs font-black uppercase tracking-[0.3em] text-slate-500 hover:bg-black hover:text-white transition-all">
                    ← Search Another Name
                </button>
            </div>
        </div>
    </main>

    <div id="confirm-modal">
        <div class="bg-white p-12 rounded-[60px] modal-content text-center premium-border shadow-2xl">
            <h3 class="text-3xl font-black italic mb-2 uppercase">Confirm Selection</h3>
            <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest mb-6">You are about to secure:</p>
            <span id="modal-domain" class="electric-blue font-black tracking-tighter"></span>
            
            <div class="space-y-4 mt-10">
                <button onclick="proceedToStripe()" class="w-full bg-black text-white font-black py-6 rounded-2xl uppercase tracking-widest hover:bg-electric-blue transition-all shadow-xl text-lg">Confirm & Pay →</button>
                <button onclick="closeModal()" class="text-slate-400 font-black py-2 uppercase text-[10px] tracking-widest block mx-auto hover:text-black transition-all">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        const makeWebhookUrl = "https://hook.eu2.make.com/lsapnqg6h81b8nxavc2kbyc8l0uqrp4r";
        let selectedDomain = "";

        async function checkAvailability() {
            const domainInput = document.getElementById('target_domain').value.trim();
            if(!domainInput.includes('.')) return alert("Please enter a valid domain");

            const btn = document.getElementById('check-btn');
            btn.innerText = "VERIFYING...";
            btn.disabled = true;

            try {
                const response = await fetch(makeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain: domainInput })
                });
                const result = await response.json();

                document.getElementById('search-box').style.display = 'none';
                document.getElementById('results-area').classList.add('active');

                const primaryName = document.getElementById('primary-name');
                const primaryAction = document.getElementById('primary-action');
                primaryName.innerText = domainInput.toUpperCase();

                // בדיקה קפדנית - דורש שה-Make יחזיר תשובה מדויקת
                if (result.available === true || result.available === "true") {
                    primaryName.className = "text-4xl font-black mb-4 italic electric-blue tracking-tight";
                    primaryAction.innerHTML = `<button onclick="openModal('${domainInput}')" class="w-full bg-electric-blue text-white font-black py-6 rounded-2xl uppercase tracking-widest shadow-2xl text-lg">Select Primary →</button>`;
                } else {
                    primaryName.className = "text-4xl font-black mb-4 italic text-slate-200 line-through tracking-tight";
                    primaryAction.innerHTML = `<p class="text-sm font-black text-red-500 uppercase tracking-[0.2em]">Already Taken</p>`;
                }

                showAlternatives(domainInput, result.alternatives);
            } catch (e) { alert("Server connection lost."); }
            finally { btn.innerText = "Check Availability →"; btn.disabled = false; }
        }

        function showAlternatives(original, alts) {
            const list = document.getElementById('alt-list');
            const title = document.getElementById('alt-title');
            list.innerHTML = '';
            
            const altsArray = Array.isArray(alts) ? alts.filter(a => a && a.trim().toLowerCase() !== original.toLowerCase()) : [];

            if (altsArray.length === 0) {
                title.innerText = "No Alternatives Available";
                title.className = "label-power-black text-center mb-4 italic text-slate-300";
                return;
            }

            title.innerText = "Alternative Suggestions";
            title.className = "label-power-black text-center mb-8 italic";

            altsArray.forEach(alt => {
                const cleanAlt = alt.trim();
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-6 bg-slate-50 rounded-3xl border-4 border-transparent hover:border-black transition-all group";
                row.innerHTML = `<span class="font-black text-base uppercase">${cleanAlt}</span>
                                <button onclick="openModal('${cleanAlt}')" class="bg-black text-white text-[10px] font-black px-6 py-3 rounded-xl uppercase tracking-widest group-hover:bg-electric-blue transition-colors">Select</button>`;
                list.appendChild(row);
            });
        }

        function openModal(domain) {
            selectedDomain = domain;
            const display = document.getElementById('modal-domain');
            display.innerText = domain.toUpperCase();
            
            // פונט דינמי
            let fontSize = 3.5; 
            if (domain.length > 15) fontSize = 2.5;
            if (domain.length > 25) fontSize = 1.8;
            if (domain.length > 35) fontSize = 1.4;
            
            display.style.fontSize = fontSize + 'rem';
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('confirm-modal').classList.remove('active'); }
        
        function proceedToStripe() {
            const recordId = new URLSearchParams(window.location.search).get('record_id');
            window.location.href = `https://buy.stripe.com/14A9BC3HId7Cf3j4gn?client_reference_id=${recordId}&prefilled_email=${encodeURIComponent(selectedDomain)}`;
        }

        function resetSearch() {
            document.getElementById('search-box').style.display = 'block';
            document.getElementById('results-area').classList.remove('active');
            document.getElementById('target_domain').value = '';
        }
    </script>
</body>
</html>
