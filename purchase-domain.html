<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Your Domain | SiteSnap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .electric-blue { color: #0070f3; }
        .bg-electric-blue { background-color: #0070f3; }
        .premium-border { border: 6px solid #000; }
        .status-area { display: none; animation: fadeIn 0.4s ease-out; }
        .status-area.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modal - Dynamic & No Wrap */
        #confirm-modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 20px; 
        }
        #confirm-modal.active { display: flex; }
        
        .modal-content { 
            max-width: 90vw; min-width: 320px; width: fit-content; 
            transition: all 0.3s ease; 
        }

        #modal-domain {
            white-space: nowrap; /* מונע ירידת שורה */
            display: block;
            margin: 15px auto;
            transition: font-size 0.2s ease;
        }
    </style>
</head>
<body class="antialiased text-black">

    <header class="max-w-7xl mx-auto px-6 py-10 flex flex-col items-center">
        <img src="https://raw.githubusercontent.com/levydave1/trysitesnap/refs/heads/main/logo.png" alt="SiteSnap" class="h-28 w-auto object-contain mb-4">
        <div class="text-sm font-black uppercase tracking-[0.25em] text-slate-800 text-center">Premium Websites • Pure Simplicity</div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-8">
        <div class="max-w-xl mx-auto premium-border p-10 md:p-16 rounded-[60px] relative bg-white shadow-2xl">
            <div id="search-box">
                <input type="text" id="target_domain" placeholder="mybusiness.com" class="w-full px-6 py-5 rounded-2xl border-4 border-slate-100 bg-slate-50 focus:bg-white focus:outline-none focus:border-blue-500 transition-all font-bold text-xl text-black text-center mb-4">
                <button onclick="checkAvailability()" id="check-btn" class="w-full bg-electric-blue text-white font-black py-6 rounded-2xl shadow-xl hover:opacity-90 transition-all text-xl uppercase tracking-widest">Check Availability -></button>
            </div>

            <div id="results-area" class="status-area mt-4 text-center">
                <div id="primary-status" class="p-6 rounded-3xl mb-4">
                    <h3 id="primary-name" class="text-xl font-black mb-2 italic"></h3>
                    <div id="primary-action"></div>
                </div>
                <div class="border-t border-slate-100 pt-6">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4">Alternatives</h4>
                    <div id="alt-list" class="space-y-3"></div>
                </div>
                <button onclick="resetSearch()" class="w-full mt-8 text-xs font-black uppercase tracking-widest text-slate-400">← Back</button>
            </div>
        </div>
    </main>

    <!-- פופ-אפ דינמי -->
    <div id="confirm-modal">
        <div class="bg-white p-10 md:p-14 rounded-[50px] modal-content premium-border shadow-2xl">
            <h3 class="text-2xl font-black italic mb-2 uppercase">Confirm Selection</h3>
            <p class="text-slate-400 font-bold uppercase text-[9px] tracking-widest">You are about to secure:</p>
            
            <!-- השם שישנה גודל פונט אוטומטית -->
            <span id="modal-domain" class="electric-blue font-black tracking-tight"></span>
            
            <div class="space-y-3 mt-8">
                <button onclick="proceedToStripe()" class="w-full bg-black text-white font-black py-5 rounded-2xl uppercase tracking-widest hover:bg-electric-blue transition-all">Confirm & Pay →</button>
                <button onclick="closeModal()" class="text-slate-400 font-black py-2 uppercase text-[10px] tracking-widest block mx-auto">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        const makeWebhookUrl = "https://hook.eu2.make.com/lsapnqg6h81b8nxavc2kbyc8l0uqrp4r";
        let selectedDomain = "";

        async function checkAvailability() {
            const domainInput = document.getElementById('target_domain').value.trim();
            const btn = document.getElementById('check-btn');
            btn.innerText = "Searching...";
            btn.disabled = true;

            try {
                const response = await fetch(makeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain: domainInput })
                });
                const result = await response.json();

                document.getElementById('search-box').style.display = 'none';
                document.getElementById('results-area').classList.add('active');

                const primaryName = document.getElementById('primary-name');
                const primaryAction = document.getElementById('primary-action');
                primaryName.innerText = domainInput.toUpperCase();

                // בדיקת זמינות קפדנית
                if (result.available === true || result.available === "true") {
                    primaryName.className = "text-xl font-black mb-2 italic electric-blue";
                    primaryAction.innerHTML = `<button onclick="openModal('${domainInput}')" class="w-full bg-electric-blue text-white font-black py-4 rounded-xl uppercase text-sm tracking-widest">Select Primary →</button>`;
                } else {
                    primaryName.className = "text-xl font-black mb-2 italic text-slate-300 line-through";
                    primaryAction.innerHTML = `<p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Already Taken</p>`;
                }

                showAlternatives(domainInput, result.alternatives);
            } catch (e) { alert("Check Connection"); }
            finally { btn.innerText = "Check Availability ->"; btn.disabled = false; }
        }

        function showAlternatives(original, alts) {
            const list = document.getElementById('alt-list');
            list.innerHTML = '';
            const altsArray = Array.isArray(alts) ? alts : [];
            altsArray.forEach(alt => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-blue-500 transition-all";
                row.innerHTML = `<span class="font-bold text-xs uppercase">${alt}</span>
                                <button onclick="openModal('${alt}')" class="bg-black text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase tracking-widest">Select</button>`;
                list.appendChild(row);
            });
        }

        function openModal(domain) {
            selectedDomain = domain;
            const display = document.getElementById('modal-domain');
            display.innerText = domain.toUpperCase();
            
            // לוגיקת פונט דינמי
            let fontSize = 2.5; // התחלה מ-text-4xl בערך
            if (domain.length > 15) fontSize = 1.8;
            if (domain.length > 25) fontSize = 1.4;
            if (domain.length > 35) fontSize = 1.1;
            
            display.style.fontSize = fontSize + 'rem';
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('confirm-modal').classList.remove('active'); }
        
        function proceedToStripe() {
            const recordId = new URLSearchParams(window.location.search).get('record_id');
            window.location.href = `https://buy.stripe.com/14A9BC3HId7Cf3j4gn?client_reference_id=${recordId}&prefilled_email=${encodeURIComponent(selectedDomain)}`;
        }

        function resetSearch() {
            document.getElementById('search-box').style.display = 'block';
            document.getElementById('results-area').classList.remove('active');
        }
    </script>
</body>
</html>
