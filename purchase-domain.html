<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Your Domain | SiteSnap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .electric-blue { color: #0070f3; }
        .bg-electric-blue { background-color: #0070f3; }
        .premium-border { border: 6px solid #000; }
        .status-area { display: none; animation: fadeIn 0.4s ease-out; }
        .status-area.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .alt-btn { border: 2px solid #f1f5f9; transition: all 0.2s; }
        .alt-btn:hover { border-color: #0070f3; background-color: #f8faff; }
        
        /* Modal Styles */
        #confirm-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        #confirm-modal.active { display: flex; }
    </style>
</head>
<body class="antialiased text-black">

    <header class="max-w-7xl mx-auto px-6 py-10 flex flex-col items-center">
        <img src="https://raw.githubusercontent.com/levydave1/trysitesnap/refs/heads/main/logo.png" alt="SiteSnap" class="h-28 w-auto object-contain mb-4">
        <div class="text-sm font-black uppercase tracking-[0.25em] text-slate-800 text-center">Premium Websites • Pure Simplicity</div>
    </header>

    <main class="max-w-4xl mx-auto px-6 pb-24 pt-8">
        <div class="text-center mb-12">
            <h1 class="text-4xl md:text-5xl font-black italic mb-6">Final Step: Go <span class="electric-blue">Live</span>.</h1>
            <p class="text-lg text-slate-600 font-bold uppercase tracking-wide">Secure your unique digital address.</p>
        </div>

        <div class="max-w-xl mx-auto premium-border p-10 md:p-16 rounded-[60px] relative bg-white shadow-2xl">
            <div class="absolute -top-6 left-1/2 -translate-x-1/2 bg-black text-white px-8 py-3 rounded-full font-black uppercase text-xs tracking-[0.2em] whitespace-nowrap">Concierge Domain Setup</div>

            <div id="search-box">
                <label class="font-black uppercase text-xs tracking-widest block text-center mb-4">Enter Desired Domain</label>
                <input type="text" id="target_domain" placeholder="mybusiness.com" class="w-full px-6 py-5 rounded-2xl border-4 border-slate-100 bg-slate-50 focus:bg-white focus:outline-none focus:border-blue-500 transition-all font-bold text-xl text-black text-center mb-4">
                <button onclick="checkAvailability()" id="check-btn" class="w-full bg-electric-blue text-white font-black py-6 rounded-2xl shadow-xl hover:opacity-90 transition-all text-xl uppercase tracking-widest">Check Availability -></button>
            </div>

            <div id="results-area" class="status-area mt-4">
                <div id="primary-status" class="p-6 rounded-3xl mb-6 text-center">
                    <h3 id="primary-name" class="text-xl font-black mb-2 italic"></h3>
                    <div id="primary-action"></div>
                </div>

                <div class="border-t border-slate-100 pt-6">
                    <h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 mb-4 text-center">Alternative Suggestions</h4>
                    <div id="alt-list" class="space-y-3"></div>
                </div>

                <button onclick="resetSearch()" class="w-full mt-8 text-xs font-black uppercase tracking-widest text-slate-400 hover:text-black transition-all">← Search different name</button>
            </div>
        </div>

        <p class="text-center mt-6 text-slate-700 font-bold uppercase text-[10px] tracking-[0.1em] max-w-sm mx-auto">
            Your $229 license is Lifetime. First year domain included. Annual renewals apply thereafter.
        </p>
    </main>

    <div id="confirm-modal">
        <div class="bg-white p-10 rounded-[40px] max-w-sm w-full mx-6 text-center premium-border">
            <h3 class="text-2xl font-black italic mb-4">Confirm Selection</h3>
            <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-8">You are about to secure:<br><span id="modal-domain" class="electric-blue text-lg"></span></p>
            
            <div class="space-y-3">
                <button onclick="proceedToStripe()" class="w-full bg-black text-white font-black py-5 rounded-2xl uppercase tracking-widest hover:bg-electric-blue transition-all">Confirm & Pay →</button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-black py-2 uppercase text-[10px] tracking-widest">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        const makeWebhookUrl = "https://hook.eu2.make.com/lsapnqg6h81b8nxavc2kbyc8l0uqrp4r";
        let selectedDomain = "";

        async function checkAvailability() {
            const domain = document.getElementById('target_domain').value.trim();
            if (!domain.includes('.')) return alert("Please enter a valid domain (e.g. david.com)");

            const btn = document.getElementById('check-btn');
            btn.innerText = "Searching...";
            btn.disabled = true;

            try {
                const response = await fetch(makeWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domain: domain })
                });
                const result = await response.json();

                // הצגת אזור התוצאות
                document.getElementById('search-box').style.display = 'none';
                document.getElementById('results-area').classList.add('active');

                // 1. טיפול בדומיין הראשי
                const primaryName = document.getElementById('primary-name');
                const primaryAction = document.getElementById('primary-action');
                primaryName.innerText = domain.toUpperCase();

                if (result.available === true || result.available === "true") {
                    primaryName.className = "text-xl font-black mb-2 italic electric-blue";
                    primaryAction.innerHTML = `
                        <p class="text-xs font-bold text-slate-400 mb-4 uppercase">This domain is available!</p>
                        <button onclick="openModal('${domain}')" class="w-full bg-electric-blue text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-lg">Select Primary →</button>
                    `;
                } else {
                    primaryName.className = "text-xl font-black mb-2 italic text-slate-300 line-through";
                    primaryAction.innerHTML = `<p class="text-xs font-bold text-red-500 uppercase">Unavailable</p>`;
                }

                // 2. טיפול באלטרנטיבות (תמיד)
                showAlternatives(domain, result.alternatives);

            } catch (e) {
                alert("Connection error. Check Make.com");
            } finally {
                btn.innerText = "Check Availability ->";
                btn.disabled = false;
            }
        }

        function showAlternatives(original, alts) {
            const list = document.getElementById('alt-list');
            list.innerHTML = '';
            
            const altsArray = Array.isArray(alts) ? alts : (alts ? alts.split(',') : []);
            const filtered = altsArray.filter(a => a.trim().toLowerCase() !== original.toLowerCase() && a.trim() !== "");

            if (filtered.length === 0) {
                list.innerHTML = '<p class="text-slate-400 text-[10px] font-black text-center uppercase">No other suggestions available.</p>';
                return;
            }

            filtered.forEach(alt => {
                const cleanAlt = alt.trim();
                const btn = document.createElement('div');
                btn.className = "flex items-center justify-between p-4 bg-slate-50 rounded-2xl border-2 border-transparent hover:border-blue-500 transition-all";
                btn.innerHTML = `
                    <span class="font-bold text-sm uppercase">${cleanAlt}</span>
                    <button onclick="openModal('${cleanAlt}')" class="bg-black text-white text-[10px] font-black px-4 py-2 rounded-lg uppercase tracking-widest hover:bg-electric-blue">Select</button>
                `;
                list.appendChild(btn);
            });
        }

        function openModal(domain) {
            selectedDomain = domain;
            document.getElementById('modal-domain').innerText = domain.toUpperCase();
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('active');
        }

        function proceedToStripe() {
            const recordId = new URLSearchParams(window.location.search).get('record_id');
            const stripeUrl = `https://buy.stripe.com/14A9BC3HId7Cf3j4gn?client_reference_id=${recordId}&prefilled_email=${encodeURIComponent(selectedDomain)}`;
            window.location.href = stripeUrl;
        }

        function resetSearch() {
            document.getElementById('search-box').style.display = 'block';
            document.getElementById('results-area').classList.remove('active');
        }
    </script>
</body>
</html>
