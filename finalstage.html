<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment Successful | SiteSnap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; overflow-x: hidden; }
        .electric-blue { color: #0070f3; }
        .bg-electric-blue { background-color: #0070f3; }
        .premium-border { border: 6px solid #000; }
        
        .success-icon { 
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body class="antialiased flex flex-col min-h-screen">

    <canvas id="confetti" class="confetti-canvas"></canvas>

    <header class="max-w-7xl mx-auto px-6 py-10">
        <img src="https://raw.githubusercontent.com/levydave1/trysitesnap/refs/heads/main/logo.png" alt="SiteSnap" class="h-16 w-auto">
    </header>

    <main class="flex-grow flex items-center justify-center px-6 pb-24">
        <div class="max-w-3xl w-full text-center">
            
            <div class="success-icon text-7xl mb-8"></div>
            
            <h1 id="status-title" class="text-5xl md:text-8xl font-black italic tracking-tighter mb-6 leading-none">
                DEPLOYMENT <span class="electric-blue">COMPLETE!</span>
            </h1>
            
            <div class="premium-border rounded-[50px] p-10 bg-white shadow-2xl relative mb-12 overflow-hidden">
                <div id="dynamic-content" class="space-y-6">
                    </div>
            </div>

            <div id="action-buttons" class="flex flex-col md:flex-row gap-4 justify-center items-center">
                </div>
        </div>
    </main>

    <footer class="py-10 text-center opacity-30">
        <p class="text-[10px] font-black uppercase tracking-[0.4em]">SiteSnap Global Infrastructure v3.0</p>
    </footer>

    <script>
        // פונקציה לשליפת פרמטרים מה-URL
        const urlParams = new URLSearchParams(window.location.search);
        const plan = urlParams.get('plan'); // subdomain / new / existing
        const address = urlParams.get('address'); // הכתובת של האתר

        const contentDiv = document.getElementById('dynamic-content');
        const buttonsDiv = document.getElementById('action-buttons');
        const statusTitle = document.getElementById('status-title');

        // לוגיקת הצגת התוכן
        if (plan === 'subdomain') {
            contentDiv.innerHTML = `
                <h3 class="text-2xl font-black uppercase italic mb-2">Your site is Live!</h3>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-6">World-wide propagation finished.</p>
                <div class="bg-slate-50 py-6 px-4 rounded-3xl border-2 border-dashed border-slate-200">
                    <span class="text-slate-400 font-bold text-[10px] uppercase block mb-1">Your new URL:</span>
                    <a href="https://${address}" target="_blank" class="text-2xl md:text-3xl font-black text-black underline hover:text-blue-600 transition-colors">${address}</a>
                </div>
            `;
            buttonsDiv.innerHTML = `
                <a href="https://${address}" target="_blank" class="bg-electric-blue text-white px-12 py-6 rounded-full font-black uppercase text-sm tracking-widest shadow-2xl hover:scale-105 transition-all">Visit Site Now →</a>
            `;

        } else if (plan === 'new') {
            contentDiv.innerHTML = `
                <h3 class="text-2xl font-black uppercase italic mb-2">Securing your Domain</h3>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-6">Our concierge is registering: <span class="text-black">${address}</span></p>
                <div class="flex items-center justify-center gap-4 py-8">
                    <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <p class="text-left font-bold text-sm leading-tight text-slate-600 uppercase">We are linking the domain to our servers.<br><span class="text-blue-600">Expected live time: 2-4 hours.</span></p>
                </div>
            `;
            buttonsDiv.innerHTML = `
                <button onclick="window.print()" class="bg-black text-white px-10 py-5 rounded-full font-black uppercase text-sm tracking-widest">Save Receipt</button>
            `;

        } else if (plan === 'existing') {
            statusTitle.innerHTML = 'CONNECTION <span class="electric-blue">STARTED</span>';
            contentDiv.innerHTML = `
                <h3 class="text-2xl font-black uppercase italic mb-2">DNS Link in Progress</h3>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest mb-6">We are scanning the web for your signals.</p>
                <div class="text-left space-y-4 max-w-md mx-auto bg-slate-50 p-6 rounded-3xl">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                        <p class="text-[10px] font-black uppercase">Stripe Payment Verified</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 bg-yellow-500 rounded-full animate-pulse"></div>
                        <p class="text-[10px] font-black uppercase text-slate-400">Waiting for DNS Propagation (up to 24h)</p>
                    </div>
                </div>
            `;
            buttonsDiv.innerHTML = `
                <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">You will receive an email once the link is active.</p>
            `;
        } else {
            // מקרה חירום אם אין פרמטרים
            contentDiv.innerHTML = `<p class="font-black uppercase">System ready. Waiting for data...</p>`;
        }
    </script>
</body>
</html>
